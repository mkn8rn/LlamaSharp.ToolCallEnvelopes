name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LlamaSharp.ToolCallEnvelopes.slnx

      - name: Verify formatting and analyzers
        run: >-
          dotnet format LlamaSharp.ToolCallEnvelopes.slnx
          --verify-no-changes --no-restore --severity warn

      - name: Build without warnings
        run: >-
          dotnet build LlamaSharp.ToolCallEnvelopes.slnx
          --configuration Release --no-restore

      - name: Test and collect coverage
        run: >-
          dotnet test LlamaSharp.ToolCallEnvelopes.Tests/LlamaSharp.ToolCallEnvelopes.Tests.csproj
          --configuration Release --no-build
          --filter "TestCategory!=NativeModel"
          --collect "XPlat Code Coverage"
          --results-directory artifacts/coverage
          --logger "console;verbosity=minimal"

      - name: Enforce coverage
        shell: pwsh
        run: |
          $report = Get-ChildItem artifacts/coverage -Recurse -Filter coverage.cobertura.xml |
              Select-Object -First 1
          if ($null -eq $report) {
              throw 'The test run produced no Cobertura coverage report.'
          }
          ./eng/Verify-Coverage.ps1 -ReportPath $report.FullName

      - name: Pack
        run: >-
          dotnet pack LlamaSharp.ToolCallEnvelopes/LlamaSharp.ToolCallEnvelopes.csproj
          --configuration Release --no-build
          --output artifacts/package

      - name: Inspect package
        shell: pwsh
        run: >-
          ./eng/Verify-Package.ps1
          -PackageDirectory artifacts/package
          -ExpectedCommit $env:GITHUB_SHA

      - name: Test isolated package consumer
        shell: pwsh
        run: ./eng/Test-PackageConsumer.ps1 -PackageDirectory artifacts/package
